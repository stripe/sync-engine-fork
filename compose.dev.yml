# Application layer — engine + service API + Temporal worker.
# Use together with compose.yml:
#   docker compose -f compose.yml -f compose.dev.yml up --build -d
#
# Requires pre-built dist/ in build context: run `pnpm build` first.
#
# One-shot Temporal init (Keyword search attributes for pipelineWorkflow) lives
# here so `docker compose -f compose.yml up` (CI unit/integration) is unaffected.

services:
  temporal-search-attributes:
    image: temporalio/admin-tools:latest
    depends_on:
      temporal:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        set -e
        temporal operator cluster health --address temporal:7233
        temporal operator search-attribute create --address temporal:7233 --namespace default \
          --name SyncEnginePipelineStatus --type Keyword || true
        temporal operator search-attribute create --address temporal:7233 --namespace default \
          --name SyncEnginePipelineDesiredStatus --type Keyword || true
    restart: 'no'

  engine:
    image: sync-engine-engine:dev
    build:
      context: .
      target: engine
    ports:
      - '4010:3000'
    environment:
      PORT: '3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  service:
    image: sync-engine-service:dev
    build:
      context: .
      target: service
    ports:
      - '4020:4020'
    command:
      - serve
      - --temporal-address
      - temporal:7233
      - --temporal-task-queue
      - sync-engine
      - --port
      - '4020'
    depends_on:
      engine:
        condition: service_healthy
      temporal:
        condition: service_healthy
      temporal-search-attributes:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4020/health || exit 1']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  worker:
    image: sync-engine-service:dev
    command:
      - worker
      - --temporal-address
      - temporal:7233
      - --temporal-task-queue
      - sync-engine
      - --engine-url
      - http://engine:3000
    depends_on:
      engine:
        condition: service_healthy
      temporal:
        condition: service_healthy
      temporal-search-attributes:
        condition: service_completed_successfully

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - '5173:5173'
    environment:
      ENGINE_URL: http://engine:3000
      SERVICE_URL: http://service:4020
    depends_on:
      engine:
        condition: service_healthy
      service:
        condition: service_healthy
